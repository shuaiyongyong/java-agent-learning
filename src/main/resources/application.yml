spring:
  application:
    name: java-agent-learning
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: always
        timeout: 60s
        max-retries: 1
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5:7b}
          temperature: ${OLLAMA_TEMPERATURE:0.7}
