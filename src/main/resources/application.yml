spring:
  application:
    name: java-agent-learning
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: always
        timeout: 60s
        max-retries: 1
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5:7b}
          temperature: ${OLLAMA_TEMPERATURE:0.7}
server:
  tomcat:
    uri-encoding: UTF-8          # 关键：Tomcat 解析 URL 参数时使用的编码
  servlet:
    encoding:
      charset: UTF-8             # 响应和请求的默认字符集
      force: true                # 强制使用该编码（Spring Boot 2.x 支持）
      force-request: true
      force-response: true